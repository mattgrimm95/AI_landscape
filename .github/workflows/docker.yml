# Build the Docker image on every push + PR (verification); push to
# ghcr.io on every push to main so the latest image is always one
# `docker pull ghcr.io/<owner>/ai_landscape:latest` away.
#
# Three jobs:
#   * build            — runs on push + PR; ensures the Dockerfile still
#                        builds against the current source. No registry
#                        push, so PRs from forks don't need package perms.
#   * build-and-push   — runs on push to main only; builds with cache
#                        from the registry, pushes :latest + :sha tag.
#   * smoke-test       — runs on push to main after build-and-push:
#                        pulls the just-published image by its SHA tag,
#                        boots it, polls /api/overview until 200 or
#                        30s timeout. Closes the "Dockerfile built but
#                        the app crashes on startup" gap that the host
#                        Python tests can't catch.
#
# GHCR auth uses the workflow's GITHUB_TOKEN with packages:write
# permission — no PAT to manage, no secret to rotate.

name: docker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # GHCR image coordinates. The image name is lowercased per Docker
  # registry naming rules (ghcr.io requires all-lowercase namespaces).
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ai_landscape

jobs:
  # Build-only verification: runs on PRs (where the secret to push
  # isn't available) and on push as a fast pre-check. The push job
  # below repeats the build with cache, so this is cheap.
  build:
    name: Build (verify)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          # Local layer cache only — no registry round-trip on
          # verification builds. The publish job below uses GHCR cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ai-landscape:local

  # Publish: only on push to main. Tagged as :latest plus the commit SHA
  # so a rollback is always one `docker pull ghcr.io/.../ai_landscape:<sha>`
  # away.
  build-and-push:
    name: Build + push to GHCR
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Lowercase the namespace -- ghcr.io rejects mixed-case names.
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Smoke-test the published image — closes the gap where a Dockerfile
  # builds fine but the app crashes on startup. Pulls the *exact* image
  # we just pushed (by SHA tag, not :latest, so a concurrent push can't
  # race us), boots it, polls /api/overview until it returns 200 or
  # 30 seconds elapse. On failure, tails the container logs to make
  # the diagnostic trivial.
  smoke-test:
    name: Smoke-test published image
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read       # only need to PULL, not push
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute short SHA tag
        id: tag
        # The build-and-push job tagged the image as sha-<7-char short>;
        # docker/metadata-action's default short SHA is the first 7
        # chars of $GITHUB_SHA. Match that here so we always pull the
        # exact image this run produced.
        run: echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Pull the published image
        run: docker pull "${{ steps.tag.outputs.image }}"

      - name: Run the container
        run: |
          docker run -d \
            --name ail-smoke \
            -p 8000:8000 \
            "${{ steps.tag.outputs.image }}"
          echo "Container started; container ID: $(docker ps -q -f name=ail-smoke)"

      - name: Wait for /api/overview to return 200
        # Poll once per second for up to 60s. The image ships with the
        # derived SQLite DBs pre-built (see Dockerfile RUN rebuild), so
        # the FastAPI server should respond within a few seconds of
        # boot. 60s is comfortable headroom on a cold runner.
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl -fsS -o /tmp/overview.json -w '%{http_code}' \
                http://localhost:8000/api/overview > /tmp/code 2>/dev/null
            then
              code=$(cat /tmp/code)
              if [ "$code" = "200" ]; then
                bytes=$(wc -c < /tmp/overview.json)
                echo "::notice::/api/overview returned 200 (${bytes}B) after ${i}s"
                exit 0
              fi
            fi
            sleep 1
          done
          echo "::error::/api/overview never returned 200 within 60s"
          docker logs ail-smoke || true
          exit 1

      - name: Tear down container
        if: always()
        run: docker rm -f ail-smoke || true
