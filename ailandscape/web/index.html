<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Landscape — Knowledge Graph</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/cytoscape@3/dist/cytoscape.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/layout-base/layout-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cose-base/cose-base.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/cytoscape-fcose/cytoscape-fcose.js"></script>
</head>
<body>
  <header id="topbar">
    <h1>AI Landscape <span>National-Security Knowledge Graph</span></h1>
    <div id="topbar-right">
      <button id="open-guide" class="ghost">Guide</button>
      <button id="open-briefing" class="ghost">Briefing</button>
      <button id="open-trends" class="ghost">Trends</button>
      <button id="open-dashboard" class="ghost">Dashboard</button>
      <div id="stats">loading…</div>
    </div>
  </header>

  <div id="layout">
    <aside id="sidebar">
      <section class="panel">
        <h2>Start here</h2>
        <div id="starter-grid" class="starter-grid"></div>
      </section>

      <section class="panel">
        <h2>Search</h2>
        <input id="search" type="search" placeholder="Find an entity…"
               autocomplete="off" />
        <ul id="search-results"></ul>
      </section>

      <section class="panel">
        <h2>Connection</h2>
        <input id="path-from" type="search" placeholder="From entity…"
               autocomplete="off" />
        <input id="path-to" type="search" placeholder="To entity…"
               autocomplete="off" />
        <button id="find-path">How are they connected?</button>
      </section>

      <section class="panel" id="overview-panel">
        <h2>Overview</h2>
        <div id="overview">loading…</div>
      </section>

      <section class="panel">
        <h2>View</h2>
        <label>Entity type
          <select id="f-type"><option value="">all types</option></select>
        </label>
        <label>Min mentions
          <input id="f-min-mentions" type="number" value="0" min="0" />
        </label>
        <label>Min edge weight
          <input id="f-min-weight" type="number" value="8" min="1" />
        </label>
        <label>Max nodes
          <input id="f-max-nodes" type="number" value="70" min="5" max="400" />
        </label>
        <label class="check">
          <input id="f-relations-only" type="checkbox" />
          Typed relationships only
        </label>
        <div class="row">
          <button id="apply">Apply</button>
          <button id="reset" class="ghost">Reset</button>
        </div>
      </section>

      <section class="panel" id="detail-panel" hidden>
        <h2>Selected entity</h2>
        <div id="detail"></div>
      </section>

      <section class="panel">
        <h2>Legend</h2>
        <ul id="legend"></ul>
      </section>
    </aside>

    <main id="main">
      <div id="cy"></div>
      <div id="hint">drag to pan · scroll to zoom · click a node for detail · blue arrows are typed relationships</div>
      <div id="message"></div>
    </main>
  </div>

  <div id="modal" hidden>
    <div id="modal-backdrop"></div>
    <div id="modal-card">
      <button id="modal-close" aria-label="Close">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
